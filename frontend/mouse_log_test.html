<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>손전등 캡챠 마우스 로그 수집</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f5f5f5;
      }

      #captchaArea {
        position: relative;
        width: 800px;
        height: 600px;
        overflow: hidden;
        border: 2px solid #333;
        background-size: 800px 600px;
        cursor: crosshair;
      }

      #darkLayer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          circle 180px at var(--x, 50%) var(--y, 50%),
          rgba(255, 255, 255, 0) 0%,
          rgba(0, 0, 0, 0.65) 35%,
          rgba(0, 0, 0, 0.99) 100%
        );
      }

      textarea {
        margin-top: 15px;
        width: 800px;
        height: 260px;
        display: block;
      }
    </style>
  </head>

  <body>
    <h2>손전등 캡챠 마우스 로그 수집 테스트</h2>
    <p>데이터 로딩 중...</p>

    <div id="captchaArea">
      <div id="darkLayer"></div>
    </div>

    <textarea
      id="output"
      placeholder="클릭하면 JSON 로그가 표시되고 자동 저장됩니다."
    ></textarea>

    <script>
      const captchaArea = document.getElementById("captchaArea");
      const darkLayer = document.getElementById("darkLayer");
      const output = document.getElementById("output");
    
      // [설정] 백엔드 포트 포워딩 주소
      const BACKEND_URL = "http://13.125.211.33:5000";
    
      let currentCaptcha = null;
      let logData = null;
      let startTime = null;
      let lastLogTime = 0;
      const SAMPLE_INTERVAL = 50; // 마우스 로그 수집 간격 (ms)
    
      function resetLogData() {
        if (!currentCaptcha) return;
        logData = {
          session_id: "sess_" + Date.now(),
          image_id: currentCaptcha.image_id,
          target_object: currentCaptcha.target_object,
          result: "pending",
          duration: null,
          click: null,
          bbox: currentCaptcha.bbox,
          mouse_logs: [],
        };
        startTime = null;
        lastLogTime = 0;
        output.value = "";
      }
    
      // 클릭 좌표가 정답 영역(Bounding Box) 안에 있는지 판별하는 핵심 로직
      function isCorrectClick(x, y, bbox) {
        return (
          x >= bbox.x &&
          x <= bbox.x + bbox.width &&
          y >= bbox.y &&
          y <= bbox.y + bbox.height
        );
      }
    
      async function loadCaptcha() {
        try {
          const response = await fetch(`${BACKEND_URL}/get-captcha`);
          currentCaptcha = await response.json();
    
          const fullImageUrl = `${BACKEND_URL}${currentCaptcha.image_url}`;
          captchaArea.style.backgroundImage = `url("${fullImageUrl}")`;
    
          document.querySelector("p").innerText =
            `마우스를 움직여 '${currentCaptcha.target_object}' 객체를 찾고 클릭하세요.`;
    
          resetLogData();
        } catch (error) {
          console.error("캡챠 로드 실패:", error);
          output.value = "백엔드 서버에 연결할 수 없습니다. 포트 포워딩(5000)을 확인하세요.";
        }
      }
    
      // 마우스 움직임 및 손전등 효과 처리
      captchaArea.addEventListener("mousemove", (e) => {
        if (!logData) return;
    
        const rect = captchaArea.getBoundingClientRect();
        const x = Math.round(e.clientX - rect.left);
        const y = Math.round(e.clientY - rect.top);
    
        // 손전등 위치 업데이트
        darkLayer.style.setProperty("--x", `${x}px`);
        darkLayer.style.setProperty("--y", `${y}px`);
    
        if (startTime === null) startTime = performance.now();
        const now = performance.now();
        const t = Math.round(now - startTime);
    
        // 일정 간격으로 마우스 좌표 로깅
        if (t - lastLogTime >= SAMPLE_INTERVAL) {
          logData.mouse_logs.push({ t, x, y });
          lastLogTime = t;
        }
      });
    
      // 클릭 이벤트 및 데이터 전송 처리
      captchaArea.addEventListener("click", async (e) => {
        if (!logData || !currentCaptcha) return;
    
        const rect = captchaArea.getBoundingClientRect();
        const x = Math.round(e.clientX - rect.left);
        const y = Math.round(e.clientY - rect.top);
    
        if (startTime === null) startTime = performance.now();
        const t = Math.round(performance.now() - startTime);
    
        // 정답 여부 판별
        const isCorrect = isCorrectClick(x, y, currentCaptcha.bbox);
    
        logData.duration = t;
        logData.click = { x, y, t };
        logData.result = isCorrect ? "success" : "fail";
    
        output.value = JSON.stringify(logData, null, 2);
    
        try {
          await fetch(`${BACKEND_URL}/save-log`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(logData),
          });
        } catch (error) {
          console.error("로그 저장 실패:", error);
        }
    
        // 결과 확인 후 다음 캡챠 로드
        setTimeout(() => {
          loadCaptcha();
        }, 500);
      });
    
      loadCaptcha();
    </script>
  </body>
</html>
