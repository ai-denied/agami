apiVersion: apps/v1
kind: Deployment
metadata:
  name: captcha-engine
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: captcha-engine
  template:
    metadata:
      labels:
        app: captcha-engine
    spec:
      # 앞서 정리했던 GPU 노드로 배포 위치 고정
      nodeSelector:
        kubernetes.io/hostname: host-10-3-7-10
      containers:
      - name: engine
        image: 10.3.1.10:8443/captcha/engine:latest
          # Captcha Build Trigger ID: 26213451827
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: captcha-engine-env
        resources:
          limits:
            cpu: "2"
            memory: "2Gi"
          requests:
            cpu: "1"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: captcha-engine-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: captcha-engine