apiVersion: apps/v1
kind: Deployment
metadata:
  name: agami-backend
  namespace: agami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agami-backend
  template:
    metadata:
      labels:
        app: agami-backend
    spec:
      nodeSelector:
        zone: backend
      containers:
      - name: backend
        image: agami-captcha.cloud:8443/agami/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          value: "postgres-db-postgresql.default.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: "admin"
        - name: DB_PASSWORD
          value: "admin1234"
        - name: DB_NAME
          value: "agamidb"
        - name: KAKAO_REDIRECT_URI
          value: "https://agami-captcha.cloud/auth/kakao/callback"
        # --- 추가된 부분 시작 ---
        - name: REQUESTS_CA_BUNDLE
          value: "/etc/letsencrypt/live/agami-captcha.cloud/fullchain.pem"
        - name: SSL_CERT_FILE
          value: "/etc/letsencrypt/live/agami-captcha.cloud/fullchain.pem"
        volumeMounts:
        - name: tls-certs
          mountPath: /etc/letsencrypt/live/agami-captcha.cloud
          readOnly: true
        # --- 추가된 부분 끝 ---
      volumes:
      - name: tls-certs
        secret:
          secretName: agami-tls-secret
---
# Service 부분은 수정할 필요 없습니다.
apiVersion: v1
kind: Service
metadata:
  name: agami-backend-svc
  namespace: agami
spec:
  selector:
    app: agami-backend
  ports:
    - port: 80
      targetPort: 8000