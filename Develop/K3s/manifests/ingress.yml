apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agami-ingress
  namespace: agami
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  tls:
  - hosts:
    - agami-captcha.cloud
    secretName: agami-tls-secret
  rules:
  - host: agami-captcha.cloud
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: agami-backend-svc
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agami-frontend-svc
            port:
              number: 80