apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agami-ingress
  namespace: agami
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  tls:
  - hosts:
    - agami-captcha.cloud
    secretName: agami-web-tls
  rules:
  - host: agami-captcha.cloud
    http:
      paths:
      # 1. API 라우팅
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: agami-backend-svc
            port:
              number: 80
      
      # 2. 캡챠 관련 API 라우팅 (기존 05-ingress.yaml 설정 통합)
      - path: /widget
        pathType: Prefix
        backend:
          service:
            name: captcha-api
            port:
              number: 80
      - path: /captcha
        pathType: Prefix
        backend:
          service:
            name: captcha-api
            port:
              number: 80
      - path: /static/captcha_images
        pathType: Prefix
        backend:
          service:
            name: captcha-api
            port:
              number: 80
              
      # 3. 프론트엔드 라우팅 (최하단 배치하여 나머지 요청 처리)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agami-frontend-svc
            port:
              number: 80