name: Agent CI
on:
  push:
    branches: [ "main" ]
    paths: ['Develop/Agent/**'] # 에이전트 코드가 위치한 폴더 경로로 변경하세요
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
          
      - name: Generate Tag
        id: generate_tag
        run: echo "IMAGE_TAG=$(TZ='Asia/Seoul' date +'%y%m%d%H%M')" >> $GITHUB_ENV
        
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Agent
          file: ./Develop/Agent/Dockerfile
          push: true
          # 백엔드와 동일한 네임스페이스(agami) 아래에 security-agent 이미지 생성
          tags: ${{ secrets.HARBOR_URL }}/agami/security-agent:${{ env.IMAGE_TAG }}