name: Deployment CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Develop/K3s/manifests/**'
  workflow_dispatch: 

jobs:
  # 프론트엔드 리빌드
  frontend-rebuild:
    name: Frontend Rebuild
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Create .env
        run: echo "${{ secrets.FRONTEND_ENV }}" > ./Develop/Frontend/.env
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Frontend
          file: ./Develop/Frontend/Dockerfile
          push: true
          tags: ${{ secrets.HARBOR_URL }}/agami/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 백엔드 리빌드 (추가됨)
  backend-rebuild:
    name: Backend Rebuild
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Create .env
        run: echo "${{ secrets.BACKEND_ENV }}" > ./Develop/Backend/.env
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Backend
          file: ./Develop/Backend/Dockerfile
          push: true
          tags: ${{ secrets.HARBOR_URL }}/agami/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max