name: Backend CI
on:
  push:
    branches: [ "main" ]
    paths:
      - 'Develop/Backend/**'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Backend
          file: ./Develop/Backend/Dockerfile
          push: true
          tags: ${{ secrets.HARBOR_URL }}/agami/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger ArgoCD Rollout
        run: |
          echo "Backend 배포 완료: latest 이미지를 사용합니다."
