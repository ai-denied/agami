name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Develop/Backend/**'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # [수정] 1. HTTPS 인증서를 사용하는 하버를 위해 최신 빌더(Buildx) 세팅 (insecure 제거)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # [수정] 2. 공식 Action을 사용하여 안전하게 하버 로그인
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # 3. Secrets 내용을 기반으로 .env 파일 생성
      - name: Create .env file for Backend
        run: |
          echo "${{ secrets.BACKEND_ENV }}" > ./Develop/Backend/.env

      # 4. 이미지 빌드 및 푸시
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Backend
          file: ./Develop/Backend/Dockerfile
          push: true
          tags: ${{ secrets.HARBOR_URL }}/agami/backend:latest
          # Buildx를 사용할 때 캐시를 태워 빌드 속도를 높이는 옵션 (선택)
          cache-from: type=gha
          cache-to: type=gha,mode=max
