name: Backend CI
on:
  push:
    branches: [ "main" ]
    paths: ['Develop/Backend/**']
  workflow_dispatch: 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      
      # [추가] 시크릿으로부터 .env 파일 생성
      - name: Create .env
        run: echo "${{ secrets.BACKEND_ENV }}" > ./Develop/Backend/.env

      - name: Generate Tag
        id: generate_tag
        run: echo "IMAGE_TAG=$(TZ='Asia/Seoul' date +'%y%m%d%H%M')" >> $GITHUB_ENV
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Backend
          file: ./Develop/Backend/Dockerfile
          push: true
          tags: ${{ secrets.HARBOR_URL }}/agami/backend:${{ env.IMAGE_TAG }}
      - name: Update Deployment Tag
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git pull --rebase origin main
          sed -i "s|image: .*/agami/backend:.*|image: ${{ secrets.HARBOR_URL }}/agami/backend:${{ env.IMAGE_TAG }}|g" Develop/K3s/manifests/backend/backend-deploy.yaml
          git add Develop/K3s/manifests/backend/backend-deploy.yaml
          git commit -m "Update backend image tag to ${{ env.IMAGE_TAG }}"
          git push origin main
