name: Backend CI
on:
  push:
    branches: [ "main" ]
    paths: ['Develop/Backend/**']
  workflow_dispatch: 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Generate Tag
        run: echo "IMAGE_TAG=$(date +'%y%m%d%H%M')" >> $GITHUB_ENV
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Backend
          file: ./Develop/Backend/Dockerfile
          push: true
          tags: ${{ secrets.HARBOR_URL }}/agami/backend:${{ env.IMAGE_TAG }}
      - name: Update Deployment Tag
        run: |
          # 정확한 경로 반영: K3s/manifests/backend/backend-deploy.yaml
          sed -i "s|image: .*/agami/backend:.*|image: ${{ secrets.HARBOR_URL }}/agami/backend:${{ env.IMAGE_TAG }}|g" K3s/manifests/backend/backend-deploy.yaml
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add K3s/manifests/backend/backend-deploy.yaml
          git commit -m "Update backend image tag to ${{ env.IMAGE_TAG }}"
          git push
