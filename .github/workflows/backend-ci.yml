name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Develop/Backend/**' # Backend 폴더 변경 시에만 실행

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }} # Bastion에 설치된 Harbor 주소
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Backend
          file: ./Develop/Backend/Dockerfile
          push: true
          tags: ${{ secrets.HARBOR_URL }}/library/backend:latest
