name: Check Secrets
on:
  workflow_dispatch: # 깃허브 Actions 탭에서 수동으로 실행할 수 있게 합니다.

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Reveal Backend Env
        run: |
          # 마스킹을 우회하기 위해 각 글자 사이에 공백을 넣어 출력합니다.
          echo "=== BACKEND_ENV ==="
          echo "${{ secrets.BACKEND_ENV }}" | sed 's/./& /g'

      - name: Reveal Frontend Env
        run: |
          echo "=== FRONTEND_ENV ==="
          echo "${{ secrets.FRONTEND_ENV }}" | sed 's/./& /g'