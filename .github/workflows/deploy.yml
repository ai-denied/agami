name: Build and Deploy to Minikube

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 도커 허브 로그인 (GitHub Secrets에 ID/PW가 설정되어 있어야 함)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 2. 백엔드 빌드 및 푸시 (파일명과 폴더 경로 명시)
      - name: Build and Push Backend
        run: |
          docker build -t imbazzi/mouse-back:latest -f backend/Dockerfile.backend backend/
          docker push imbazzi/mouse-back:latest

      # 3. 프론트엔드 빌드 및 푸시
      - name: Build and Push Frontend
        run: |
          docker build -t imbazzi/mouse-front:latest -f frontend/Dockerfile.frontend frontend/
          docker push imbazzi/mouse-front:latest

      # 4. 쿠버네티스 접속 설정
      - name: Set up Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_DATA }}

      # 5. 쿠버네티스 배포
      - name: Deploy to Minikube
        run: |
          kubectl apply -f k8s/backend-deploy.yml
          kubectl apply -f k8s/frontend-deploy.yml
        
      - name: Verify Deployment
        run: |
          kubectl get pods
          kubectl get svc
