name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Develop/Frontend/**'
  workflow_dispatch: # 수동 실행 버튼 추가 (테스트용)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Harbor (Direct Command)
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ secrets.HARBOR_URL }} -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Frontend
          file: ./Develop/Frontend/Dockerfile
          push: true
          # 포트가 포함된 URL이므로 자동으로 http로 찌르려고 할 겁니다.
          tags: ${{ secrets.HARBOR_URL }}/library/frontend:latest
