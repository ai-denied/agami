name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Develop/Frontend/**'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # [수정] 1. HTTPS 하버 통신을 위해 최신 빌더(Buildx) 세팅 (구형 jq/HTTP 설정 제거)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # [수정] 2. 공식 Action을 사용하여 안전하게 하버 로그인
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # 3. Secrets 내용을 기반으로 .env 파일 생성 및 확인
      - name: Create .env file for Frontend
        run: |
          echo "${{ secrets.FRONTEND_ENV }}" > ./Develop/Frontend/.env
          ls -al ./Develop/Frontend/.env

      # 4. 이미지 빌드 및 푸시
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Frontend
          file: ./Develop/Frontend/Dockerfile
          push: true
          tags: ${{ secrets.HARBOR_URL }}/agami/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
