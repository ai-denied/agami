name: Frontend CI
on:
  push:
    branches: [ "main" ]
    paths: ['Develop/Frontend/**']
  workflow_dispatch: 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Generate Tag
        run: echo "IMAGE_TAG=$(date +'%y%m%d%H%M')" >> $GITHUB_ENV
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Frontend
          push: true
          tags: ${{ secrets.HARBOR_URL }}/agami/frontend:${{ env.IMAGE_TAG }}
      - name: Update Deployment Tag
        run: |
          # 수정된 경로: Develop/K3s/manifests/frontend/frontend-deploy.yaml
          sed -i "s|image: .*/agami/frontend:.*|image: ${{ secrets.HARBOR_URL }}/agami/frontend:${{ env.IMAGE_TAG }}|g" Develop/K3s/manifests/frontend/frontend-deploy.yaml
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add Develop/K3s/manifests/frontend/frontend-deploy.yaml
          git commit -m "Update frontend image tag to ${{ env.IMAGE_TAG }}"
          git push
