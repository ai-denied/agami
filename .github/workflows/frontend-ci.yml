name: Frontend CI
on:
  push:
    branches: [ "main" ]
    paths: ['Develop/Frontend/**']
  workflow_dispatch: 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Create .env
        run: echo "${{ secrets.FRONTEND_ENV }}" > ./Develop/Frontend/.env
      - name: Generate Tag
        id: generate_tag
        run: echo "IMAGE_TAG=$(TZ='Asia/Seoul' date +'%y%m%d%H%M')" >> $GITHUB_ENV
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Frontend
          file: ./Develop/Frontend/Dockerfile
          push: true
          tags: ${{ secrets.HARBOR_URL }}/agami/frontend:${{ env.IMAGE_TAG }}