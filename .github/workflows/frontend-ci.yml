name: Frontend CI
on:
  push:
    branches: [ "main" ]
    paths:
      - 'Develop/Frontend/**'
      - 'Develop/K3s/manifests/frontend-deployment.yaml'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # ArgoCD 자동 트리거 커밋을 push하기 위해 권한 토큰 바인딩
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Create .env
        run: echo "${{ secrets.FRONTEND_ENV }}" > ./Develop/Frontend/.env

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Frontend
          file: ./Develop/Frontend/Dockerfile
          push: true
          tags: ${{ secrets.HARBOR_URL }}/agami/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # [변경] 문제 많던 kubectl 대신, ArgoCD가 변경을 감지하도록 매니페스트 파일에 테그 주입 후 자동 Git Push
      - name: Update Deployment Manifest for ArgoCD Dynamic Sync
        run: |
          TARGET_FILE="./Develop/K3s/manifests/frontend-deployment.yaml"
          
          # 매니페스트의 어노테이션 영역에 빌드 번호를 주입하여 파일에 변화를 줍니다.
          # (Deployment spec.template.metadata.annotations 하위에 기록하여 Pod 재구동 유도)
          sed -i '/image:/a \          # Build Trigger ID: '${{ github.run_id }}'' $TARGET_FILE
          
          # 변경된 매니페스트를 Git 저장소에 반영하여 ArgoCD Sync를 유도합니다.
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action Bot"
          git add $TARGET_FILE
          git commit -m "image: auto-trigger rollout deployment for agami-frontend [skip ci]"
          git push origin main