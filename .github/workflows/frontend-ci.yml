name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Develop/Frontend/**'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Create .env
        run: echo "${{ secrets.FRONTEND_ENV }}" > ./Develop/Frontend/.env

      # [추가] 년월일시분 태그 생성
      - name: Generate Tag
        id: generate_tag
        run: echo "IMAGE_TAG=$(date +'%y%m%d%H%M')" >> $GITHUB_ENV

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Frontend
          file: ./Develop/Frontend/Dockerfile
          push: true
          # [수정] latest 대신 생성된 태그 사용
          tags: ${{ secrets.HARBOR_URL }}/agami/frontend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger ArgoCD Rollout
        run: |
          echo "Frontend 배포 태그: ${{ env.IMAGE_TAG }}"
          # 참고: ArgoCD를 사용 중이라면, 여기서 새 태그를 반영한 manifest를 
          # 다른 저장소에 업데이트하거나, 아르고CD CLI를 사용하여 수동 동기화 가능합니다.
          # 예: argocd app set agami-frontend -p image.tag=${{ env.IMAGE_TAG }}
