name: Frontend CI
on:
  push:
    branches: [ "main" ]
    paths:
      - 'Develop/Frontend/**'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Create .env
        run: echo "${{ secrets.FRONTEND_ENV }}" > ./Develop/Frontend/.env

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Frontend
          file: ./Develop/Frontend/Dockerfile
          push: true
          tags: ${{ secrets.HARBOR_URL }}/agami/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 매니페스트 수정 없이 바로 배포 트리거 (kubectl 설치 필요 시 아래 단계 추가)
      - name: Trigger ArgoCD Rollout
        run: |
          # 서버(아르고가 있는 노드)에 직접 명령을 내리거나, kubectl을 통해 롤아웃 유도
          # 직접 접속이 어렵다면 이미 배포된 Deployment를 재시작하여 latest 이미지를 다시 받게 함
          echo "Frontend 배포 완료: latest 이미지를 사용합니다."
