name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Develop/Frontend/**'
  workflow_dispatch: # 수동 실행 버튼 추가 (테스트용)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker to allow HTTP (Insecure Registry)
        run: |
          # daemon.json이 없을 경우를 대비해 기본 객체 생성 후 jq 실행
          if [ ! -f /etc/docker/daemon.json ]; then echo "{}" | sudo tee /etc/docker/daemon.json; fi
          sudo jq '. + {"insecure-registries": ["${{ secrets.HARBOR_URL }}"]}' /etc/docker/daemon.json > /tmp/daemon.json
          sudo mv /tmp/daemon.json /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Frontend
          file: ./Develop/Frontend/Dockerfile
          push: true
          # 포트가 포함된 URL이므로 자동으로 http로 찌르려고 할 겁니다.
          tags: ${{ secrets.HARBOR_URL }}/library/frontend:latest
