apiVersion: apps/v1
kind: Deployment
metadata:
  name: mouse-front-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mouse-front
  template:
    metadata:
      labels:
        app: mouse-front
    spec:
      containers:
      - name: mouse-front
        # <DOCKER_ID>를 실제 본인의 도커 허브 아이디로 직접 수정하세요.
        image: <DOCKER_ID>/mouse-front:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mouse-front-service
spec:
  type: LoadBalancer
  selector:
    app: mouse-front
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
