apiVersion: apps/v1
kind: Deployment
metadata:
  name: mouse-front-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mouse-front
  template:
    metadata:
      labels:
        app: mouse-front
    spec:
      containers:
      - name: mouse-front
        # 변수 대신 실제 Docker Hub ID를 입력하거나 CI에서 치환해야 합니다.
        image: <여러분의_DOCKER_HUB_ID>/mouse-front:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mouse-front-service
spec:
  type: LoadBalancer
  selector:
    app: mouse-front
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
