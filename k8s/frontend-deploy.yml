apiVersion: apps/v1
kind: Deployment
metadata:
  name: mouse-front-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mouse-front
  template:
    metadata:
      labels:
        app: mouse-front
    spec:
      containers:
      - name: mouse-front
        image: ${{ secrets.DOCKER_USER }}/mouse-front:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mouse-front-service
spec:
  type: LoadBalancer # 외부에서 접속하기 위해 LoadBalancer 타입 사용
  selector:
    app: mouse-front
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
